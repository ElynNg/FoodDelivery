name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Deploy
      run: |
        git config --global user.name ElynNg
        git config --global user.email 74583218+ElynNg@users.noreply.github.com
        git remote set-url origin https://github.com/ElynNg/FoodDelivery.git
        npm run deploy
      env:
        user_name: 'ElynNg'
        user_email: '74583218+ElynNg@users.noreply.github.com'
        github_token: 'ELYN_GH_TOKEN'
        repository: 'FoodDelivery'
